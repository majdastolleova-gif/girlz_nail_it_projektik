<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat Fortune Teller</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Cat Fortune Teller</h1>
      <p class="subtitle">Ask the cat what you should eat for breakfast!</p>
      <div class="fortune-box">
        <img src="https://placekitten.com/600/450" alt="Fortune teller cat" />
      </div>
      <button id="predictButton">Tell My Fortune</button>
      <div id="fortuneResult" class="result hidden"></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
